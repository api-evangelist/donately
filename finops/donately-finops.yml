  - processor
principles:
- name: Visibility
  description: Track platform fees per account/campaign and separate them from processor fees; monitor total effective take rate on gross donations.
- name: Allocation
  description: Attribute donations to campaigns and fundraisers so platform-fee cost maps to fundraising initiatives.
- name: Optimization
  description: Compare tiers against projected donation volume - Growth's $99/mo breaks even against Standard's 4% at moderate volume, and Scale's $5,000 prepay wins at high volume; enable donor-covered fees to offset platform cost.
- name: Accountability
  description: Assign owners per campaign; review monthly gross donations, platform fees, and processor fees against the chosen tier.
