meters:
- name: platform_fee
  description: Percentage platform fee applied to each processed donation (4% / 2% / 0% by tier).
  unit: percent_of_donation
  aggregation: sum
  dimensions:
  - account
  - campaign
  - plan
- name: monthly_subscription
  description: Flat monthly fee on the Growth plan ($99/month).
  unit: months
  aggregation: sum
  dimensions:
  - account
- name: prepayment
  description: One-time $5,000 prepayment on the Scale plan for 0% platform fee up to $1M raised.
  unit: contract
  aggregation: sum
  dimensions:
