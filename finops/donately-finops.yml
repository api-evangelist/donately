description: >-
  FinOps view of Donately spend. Donately's cost model is a platform fee taken
  as a percentage of each processed donation (4% Standard, 2% Growth at $99/mo,
  0% Scale for a $5,000 prepayment up to $1M raised), stacked on top of payment
  processing fees charged separately by Stripe and PayPal (roughly 2.2-2.9% +
  $0.30 per card transaction; Stripe ACH 0.8% capped at $5). The REST API itself
  carries no separate metered fee - API usage does not appear on the invoice;
  cost is driven entirely by donation volume and the chosen platform-fee tier.
  Donors may optionally cover the platform fee at checkout, and offline
  donations carry no fee.
notes: >-
  Platform-fee tiers confirmed from donately.com/pricing on 2026-07-05. Payment
  processing fees are billed by the processor (Stripe/PayPal), not by Donately,
  and should be tracked as a separate line item. Reconcile exact processing
  rates and any donor-covered-fee offsets during a costing exercise.
