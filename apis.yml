aid: donately
url: https://raw.githubusercontent.com/api-evangelist/donately/refs/heads/main/apis.yml
name: Donately
kind: company
description: Donately is an online donation and fundraising platform for nonprofits,
  churches, and businesses, offering embeddable donation forms, campaign and
  peer-to-peer fundraising pages, recurring giving, and donor management. Its
  REST API (base https://api.donately.com/v2, version 2019-03-15) exposes
  accounts, campaigns, donations, recurring subscriptions, people (donors),
  fundraisers, forms, and webhooks, authenticated with an API token via HTTP
  Basic Auth. Donately charges a platform fee (4%, 2%, or 0% prepaid) on top of
  Stripe/PayPal payment processing.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Fundraising
- Donations
- Nonprofit
- Payments
- Donor Management
- Recurring Giving
created: '2026-07-05'
modified: '2026-07-05'
